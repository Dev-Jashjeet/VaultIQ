<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackDeck Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="./dashboard.css" />
</head>
<body>
  <div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo-box">
        <div class="logo-icon">
          <i class="fa-solid fa-wallet"></i>
        </div>
        <div>
          <h2>TrackDeck</h2>
          <p>Finance Manager</p>
        </div>
      </div>

      <nav class="nav-links">
        <a class="nav-item active">
          <i class="fa-solid fa-table-columns"></i>
          <span>Dashboard</span>
        </a>

        <a class="nav-item">
          <i class="fa-regular fa-rectangle-list"></i>
          <span>Transactions</span>
        </a>

        <a class="nav-item">
          <i class="fa-solid fa-chart-simple"></i>
          <span>Reports</span>
        </a>

      </nav>

      <div class="sidebar-profile">
        <div class="profile-img">
          <img src="https://i.pravatar.cc/100?img=12" alt="Profile">
        </div>
        <div>
          <h4 class="userprofile">Hello User</h4>
          <p class="userprofile">User email</p>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">

      <!-- Topbar -->
      <header class="topbar common">
        <h1 class="userprofile">Welcome, Jashjeet!</h1>

        <button class="logout-btn theme-mode">
            <i class="fa-solid fa-moon"></i>
          </button>

        <div class="topbar-right">
          <button class="logout-btn">
            Logout
          </button>

          <div class="top-avatar">
            <img src="https://i.pravatar.cc/100?img=12" alt="Avatar">
          </div>
        </div>
      </header>

      <!-- Cards -->
      <section class="summary-cards common">
        <div class="card balance-card">
          <div class="card-top">
            <div class="card-icon blue">
              <i class="fa-solid fa-wallet"></i>
            </div>
            <span>Total Balance</span>
          </div>
          <h2 class="BMEScont"></h2>
        </div>

        <div class="card income-card">
          <div class="card-top">
            <div class="card-icon green">
              <i class="fa-solid fa-arrow-trend-up"></i>
            </div>
            <span>Monthly Income</span>
          </div>
          <h2 class="BMEScont"></h2>
        </div>

        <div class="card expense-card">
          <div class="card-top">
            <div class="card-icon red">
              <i class="fa-solid fa-circle-arrow-down"></i>
            </div>
            <span>Monthly Expenses</span>
          </div>
          <h2 class="BMEScont"></h2>
        </div>

        <div class="card savings-card">
          <div class="card-top">
            <div class="card-icon light-green">
              <i class="fa-solid fa-piggy-bank"></i>
            </div>
            <span>Monthly Salary</span>
          </div>
          <h2 class="BMEScont"></h2>
        </div>
      </section>

      <!-- Add Transaction -->
      <section class="panel add-transaction common">
        <h2>Add New Transaction</h2>

        <div class="form-row">
          <input type="number" placeholder="Amount" id="Amount" class="add-Transaction">
          
          <select id="transaction" class="add-Transaction">
            <option>Income / Expense</option>
            <option>Income</option>
            <option>Expense</option>
          </select>

          <select id="type" class="add-Transaction">
            <option>Select Type</option>
            <option>Food & Groceries</option>
            <option>Rent</option>
            <option>Salary</option>
            <option>Investment</option>
            <option>Shopping</option>
            <option>Entertainment</option>
            <option>Travel</option>
            <option>Health</option>
            <option>Education</option>
            <option>Miscellaneous</option>
          </select>

          <input type="date" id="date" class="add-Transaction">

          <button class="add-TransactionBtn">Add Transaction</button>
        </div>
      </section>

      <!-- Transactions -->
      <section class="transactions-section">
        <div class="section-head common">
          <h2>Recent Transactions</h2>
          <a class="viewAll" style="cursor: pointer;">View all</a>
        </div>

        <div class="panel table-panel tablecommon">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Type</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="table-body">
              <!-- Transactions list -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- Bottom Charts -->
      <section class="bottom-grid common">
        <div class="panel chart-panel">
          <h2>Spending Overview</h2>

          <div class="fake-line-chart">
            <canvas id="lineChart"></canvas>
          </div>
        </div>

        <div class="panel doughnut-panel">
          <h2>AI Suggestions (Beta)</h2>
          <!-- Area where AI gives suggestions -->
          </div>
        </div>
      </section>

    </main>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="./js/dashboard.js"></script>
<script type="module" src="./js/transactions.js"></script>
<script type="module" src="./js/charts.js"></script>
</html>
